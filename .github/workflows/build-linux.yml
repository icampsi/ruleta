name: Build Qt App Linux

on:
  workflow_dispatch:

jobs:
  build-linux:
      name: Build Linux AppImage
      runs-on: ubuntu-22.04

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Install Linux dependencies
          run: |
            sudo apt update
            sudo apt install -y \
              build-essential \
              cmake \
              ninja-build \
              fuse \
              libfuse2 \
              libgl1-mesa-dev \
              libxkbcommon-x11-0 \
              libxcb-cursor0 \
              libpulse-dev \
              libasound2-dev \
              libfontconfig1 \
              libfreetype6 \
              libx11-xcb1 \
              libxcb1 \
              libxcb-glx0 \
              libxcb-keysyms1 \
              libxcb-image0 \
              libxcb-shm0 \
              libxcb-icccm4 \
              libxcb-sync1 \
              libxcb-xfixes0 \
              libxcb-shape0 \
              libxcb-randr0 \
              libxcb-render-util0

        - name: Install Qt
          uses: jurplel/install-qt-action@v4
          with:
            version: '6.8.*'
            host: 'linux'
            target: 'desktop'
            arch: 'linux_gcc_64'
            modules: 'qtmultimedia'

        - name: Configure with CMake
          run: |
            cmake -S . -B build \
              -G Ninja \
              -DCMAKE_BUILD_TYPE=Release

        - name: Build
          run: cmake --build build

        - name: Prepare AppDir
          run: |
            mkdir -p AppDir/usr/bin
            mkdir -p AppDir/usr/share/applications
            mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

            APP="build/bin/ruleta"

            if [ ! -f "$APP" ]; then
              echo "Could not find executable at $APP"
              echo "Available executable files:"
              find build -type f -executable
              exit 1
            fi

            cp "$APP" AppDir/usr/bin/ruleta

            cat > AppDir/usr/share/applications/ruleta.desktop <<EOF
            [Desktop Entry]
            Type=Application
            Name=Ruleta
            Exec=ruleta
            Icon=ruleta
            Categories=Game;
            Terminal=false
            EOF

            cp AppDir/usr/share/applications/ruleta.desktop AppDir/ruleta.desktop

            if [ -f resources/icon.png ]; then
              cp resources/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/ruleta.png
              cp resources/icon.png AppDir/ruleta.png
            else
              echo "No resources/icon.png found. Creating placeholder icon."
              convert -size 256x256 xc:white AppDir/usr/share/icons/hicolor/256x256/apps/ruleta.png
              cp AppDir/usr/share/icons/hicolor/256x256/apps/ruleta.png AppDir/ruleta.png
            fi

        - name: Download linuxdeployqt
          run: |
            wget -O linuxdeployqt.AppImage \
              https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage

            chmod +x linuxdeployqt.AppImage

        - name: Build AppImage
          run: |
            export VERSION=1.0.0
            export QMAKE="$Qt6_DIR/../../../bin/qmake"

            ./linuxdeployqt.AppImage AppDir/usr/share/applications/ruleta.desktop \
              -appimage \
              -verbose=2

            mv Ruleta-*.AppImage ruleta-v1.0.0-linux-x86_64.AppImage 2>/dev/null || \
            mv ruleta-*.AppImage ruleta-v1.0.0-linux-x86_64.AppImage 2>/dev/null || \
            mv *.AppImage ruleta-v1.0.0-linux-x86_64.AppImage

        - name: Upload Linux AppImage
          uses: actions/upload-artifact@v4
          with:
            name: ruleta-linux-x86_64-AppImage
            path: ruleta-v1.0.0-linux-x86_64.AppImage