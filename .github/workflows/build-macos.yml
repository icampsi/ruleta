name: Build macOS Qt App

on:
  push:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtmultimedia'

      - name: Configure with CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0

      - name: Build
        run: cmake --build build --config Release

      - name: Check app binary
        run: |
          APP_PATH=$(find build -name "*.app" -type d | head -n 1)
          EXECUTABLE=$(find "$APP_PATH/Contents/MacOS" -type f | head -n 1)

          echo "App path: $APP_PATH"
          echo "Executable: $EXECUTABLE"

          file "$EXECUTABLE"
          otool -l "$EXECUTABLE" | grep -A4 LC_BUILD_VERSION

      - name: Package app with macdeployqt
        run: |
          APP_PATH=$(find build -name "*.app" -type d | head -n 1)
          echo "Packaging app: $APP_PATH"
          macdeployqt "$APP_PATH" -dmg

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: macOS-build
          path: build/**/*.dmg